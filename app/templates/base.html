<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}C.A.M.I.{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-slate-50 min-h-screen font-sans{% endblock %}">
    {% block nav %}
    <nav class="bg-teal-800 text-white px-6 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-2.5">
            <div class="flex items-center justify-center w-8 h-8 bg-pink-400/20 rounded-lg">
                <svg class="w-4 h-4 text-pink-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight">C.A.M.I</span>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <a href="/dashboard" class="hover:text-pink-300 transition-colors">Dashboard</a>
            <a href="/users/logout" class="bg-pink-400 hover:bg-pink-300 text-white px-4 py-1.5 rounded-full font-medium transition-colors">Salir</a>
        </div>
    </nav>
    {% endblock %}
    {% block content %}{% endblock %}
</body>
</html>
