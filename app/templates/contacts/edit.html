{% extends "base.html" %}

{% block title %}Editar Adulto Mayor - CAMI{% endblock %}

{% block content %}
<main class="max-w-4xl mx-auto px-6 py-8">

    <div class="mb-6">
        <a href="/dashboard" class="text-sm text-teal-700 hover:text-teal-500 font-medium transition-colors">
            ← Volver al Dashboard
        </a>
    </div>

    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-800">Editar Contacto</h1>
        <p class="text-slate-400 text-sm mt-1">Modifica los datos del adulto mayor</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <form action="/contacts/{{ contact.id }}/edit" method="POST" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="full_name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
                        Nombre del adulto mayor
                    </label>
                    <input type="text" id="full_name" name="full_name"
                        value="{{ contact.full_name }}" required
                        class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition">
                </div>
                <div>
                    <label for="phone_number" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
                        Número de WhatsApp
                    </label>
                    <div class="flex items-center gap-2">
                        <span class="bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-500 font-medium whitespace-nowrap">+569</span>
                        <input
                            type="text"
                            id="phone_number"
                            name="phone_number"
                            value="{{ contact.phone_number[-8:] }}"
                            pattern="\d{8}"
                            maxlength="8"
                            required
                            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition">
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-1">
                <button type="submit"
                    class="bg-teal-700 hover:bg-teal-600 text-white px-5 py-2.5 rounded-xl font-semibold text-sm transition-colors cursor-pointer">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>

</main>
{% endblock %}
