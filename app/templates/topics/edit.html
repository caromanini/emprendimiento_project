{% extends "base.html" %}

{% block title %}Editar Tópico - CAMI{% endblock %}

{% block content %}
<main class="max-w-4xl mx-auto px-6 py-8">

    <div class="mb-6">
        <a href="/contacts/{{ contact_id }}/topics" class="text-sm text-teal-700 hover:text-teal-500 font-medium transition-colors">
            ← Volver a la configuración
        </a>
    </div>

    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-800">Editar Pregunta de la IA</h1>
        <p class="text-slate-400 text-sm mt-1">Modifica el título o la instrucción del tópico</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <form action="/contacts/{{ contact_id }}/topics/{{ topic.id }}/edit" method="POST" class="space-y-4">
            <div>
                <label for="title" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
                    Título corto
                </label>
                <input type="text" id="title" name="title" value="{{ topic.title }}" required
                    class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition">
            </div>
            <div>
                <label for="instruction" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
                    Instrucción para la IA
                </label>
                <textarea id="instruction" name="instruction" rows="4" required
                    class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition resize-none">{{ topic.instruction }}</textarea>
            </div>
            <div class="flex justify-end pt-1">
                <button type="submit"
                    class="bg-teal-700 hover:bg-teal-600 text-white px-5 py-2.5 rounded-xl font-semibold text-sm transition-colors cursor-pointer">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>

</main>
{% endblock %}
